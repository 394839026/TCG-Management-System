<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试注册登录</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #5568d3;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h1>测试注册和登录</h1>

  <h2>注册</h2>
  <div class="form-group">
    <label>用户名:</label>
    <input type="text" id="reg-username" value="testuser999">
  </div>
  <div class="form-group">
    <label>邮箱:</label>
    <input type="email" id="reg-email" value="test999@example.com">
  </div>
  <div class="form-group">
    <label>密码:</label>
    <input type="password" id="reg-password" value="Test@123456">
  </div>
  <button onclick="testRegister()">注册</button>

  <h2>登录</h2>
  <div class="form-group">
    <label>邮箱:</label>
    <input type="email" id="login-email" value="test456@example.com">
  </div>
  <div class="form-group">
    <label>密码:</label>
    <input type="password" id="login-password" value="Test@123456">
  </div>
  <button onclick="testLogin()">登录</button>

  <div id="result"></div>

  <script>
    async function testRegister() {
      const resultDiv = document.getElementById('result');
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value
          })
        });

        const data = await response.json();

        if (response.ok) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = '<h3>注册成功!</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = '<h3>注册失败</h3><p>' + (data.message || '未知错误') + '</p>';
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '<h3>网络错误</h3><p>' + error.message + '</p>';
      }
    }

    async function testLogin() {
      const resultDiv = document.getElementById('result');
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
          })
        });

        const data = await response.json();

        if (response.ok) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = '<h3>登录成功!</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = '<h3>登录失败</h3><p>' + (data.message || '未知错误') + '</p>';
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '<h3>网络错误</h3><p>' + error.message + '</p>';
      }
    }
  </script>
</body>
</html>
